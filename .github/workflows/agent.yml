name: Automatic Weather Agent Trigger

on:
  schedule:
    # ⏰ 国际标准时间 22:00 等于北京时间早上 06:00
    # 提早一小时在云端排队并抓取数据，确保 07:00 前精准发进你的邮箱
    - cron: '25 22 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上随时手动点击按钮测试点火

jobs:
  run-weather-task:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai requests

    - name: Run Weather Agent
      env:
        EMAIL: ${{ secrets.EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      run: python main.py  # 👈 这里已成功更换为 main.py
